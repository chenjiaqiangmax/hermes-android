name: Build Hermes Android APK

on:
  workflow_dispatch: # 允许手动点击按钮触发
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - uses: actions/checkout@v4
    
    # 2. 设置 Java 17 (项目要求)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. 赋予权限
    - name: Grant execute permission for gradlew
      run: chmod +x hermes-android-bridge/gradlew

    # 4. 执行编译
    - name: Build with Gradle
      run: |
        cd hermes-android-bridge
        # --no-daemon 防止在 CI 环境中内存溢出
        ./gradlew assembleDebug --no-daemon        

    # 5. 上传编译好的 APK
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HermesBridge-APK
        path: hermes-android-bridge/app/build/outputs/apk/debug/app-debug.apk
